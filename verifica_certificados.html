<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Verificar Certificado</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">

<div id="resultado"></div>

</div>

<script>

function pegarIdURL(){
    const params = new URLSearchParams(window.location.search);
    return params.get("id");
}

async function buscarCertificado(){

    const id = pegarIdURL();

    const response = await fetch("certificados.json");
    const dados = await response.json();

    const certificado = dados.certificados.find(c => c.id === id);

    const resultado = document.getElementById("resultado");

    if(certificado){

        resultado.innerHTML = `
        <div class="card mx-auto shadow" style="max-width:400px;">
            <div class="card-body text-center">
                <h4 class="card-title mb-3">Certificado válido</h4>
                <p><strong>Nome:</strong> ${certificado.nome}</p>
                <p><strong>Data:</strong> ${certificado.data}</p>
                <p><strong>Turma:</strong> ${certificado.turma}</p>
                <p class="text-muted">ID: ${certificado.id}</p>
            </div>
        </div>
        `;

    } else {

        resultado.innerHTML = `
        <div class="alert alert-danger text-center">
            Certificado não encontrado.
        </div>
        `;
    }

}

buscarCertificado();

</script>

</body>
</html>
